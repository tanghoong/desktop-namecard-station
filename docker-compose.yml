version: "3.8"

services:
  namecard-station:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: namecard-station
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DATA_DIR=/app/data
      # OCR / AI (v2+ — leave empty for MVP)
      - OPENAI_API_KEY=
      - GEMINI_API_KEY=
      - OPENROUTER_API_KEY=
      - OPENROUTER_BASE_URL=https://openrouter.ai/api/v1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s